name: Build Windows release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: Release version, with or without the v prefix
        required: true
        default: "0.1.8"
      upload_release:
        description: Upload assets to an existing matching GitHub Release
        required: false
        type: boolean
        default: false
permissions:
  contents: write

concurrency:
  group: windows-release-${{ inputs.version || github.ref_name }}
  cancel-in-progress: false

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Resolve release version
        id: version
        shell: pwsh
        env:
          REQUESTED_VERSION: ${{ inputs.version }}
          RELEASE_TAG: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
        run: |
          $version = $env:REQUESTED_VERSION
          if ([string]::IsNullOrWhiteSpace($version)) {
            $version = $env:RELEASE_TAG
          }
          $version = $version.Trim().TrimStart("v")
          if ($version -notmatch '^[0-9A-Za-z][0-9A-Za-z._+-]{0,63}$') {
            throw "Invalid release version: $version"
          }
          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=v$version" >> $env:GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-windows.lock.txt

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install quality tools
        run: python -m pip install -r requirements-dev.txt

      - name: Verify source quality
        run: |
          python -m ruff check paper_monitor scripts tests windows
          python -m coverage run -m unittest discover -s tests
          python -m coverage report --fail-under=70
          python -m pip_audit -r requirements-windows.lock.txt --no-deps --disable-pip --progress-spinner off

      - name: Verify release source tag
        if: ${{ github.event_name == 'push' || inputs.upload_release }}
        shell: pwsh
        env:
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          git fetch --force --tags origin
          $tagCommit = (git rev-list -n 1 $env:RELEASE_TAG).Trim()
          if ([string]::IsNullOrWhiteSpace($tagCommit)) {
            throw "Release tag does not exist: $env:RELEASE_TAG"
          }
          $headCommit = (git rev-parse HEAD).Trim()
          if ($headCommit -ne $tagCommit) {
            throw "Checked-out commit $headCommit does not match $env:RELEASE_TAG ($tagCommit). Dispatch the workflow from the release tag."
          }

      - name: Install Windows dependencies
        run: python -m pip install -r requirements-windows.lock.txt

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --yes --no-progress

      - name: Import signing certificate
        id: signing
        shell: pwsh
        env:
          SIGNING_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_SIGNING_CERTIFICATE_BASE64 }}
          SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_SIGNING_CERTIFICATE_PASSWORD }}
          PUBLIC_UPLOAD: ${{ github.event_name == 'push' || inputs.upload_release }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:SIGNING_CERTIFICATE_BASE64)) {
            if ($env:PUBLIC_UPLOAD -eq "true") {
              throw "A trusted Windows signing certificate is required before uploading public release assets."
            }
            "thumbprint=" >> $env:GITHUB_OUTPUT
            exit 0
          }
          $certificatePath = Join-Path $env:RUNNER_TEMP "paper-monitor-signing.pfx"
          try {
            [System.IO.File]::WriteAllBytes(
              $certificatePath,
              [System.Convert]::FromBase64String($env:SIGNING_CERTIFICATE_BASE64)
            )
            $password = ConvertTo-SecureString $env:SIGNING_CERTIFICATE_PASSWORD -AsPlainText -Force
            $imported = @(Import-PfxCertificate -FilePath $certificatePath -CertStoreLocation Cert:\CurrentUser\My -Password $password)
            $certificate = $imported | Where-Object HasPrivateKey | Select-Object -First 1
            if ($null -eq $certificate) {
              throw "The imported PFX does not contain a certificate with a private key."
            }
          } finally {
            if (Test-Path -LiteralPath $certificatePath) {
              Remove-Item -LiteralPath $certificatePath -Force
            }
          }
          "thumbprint=$($certificate.Thumbprint)" >> $env:GITHUB_OUTPUT

      - name: Build complete Windows release
        shell: pwsh
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
          SIGNING_THUMBPRINT: ${{ steps.signing.outputs.thumbprint }}
        run: |
          $parameters = @{
            Version = $env:RELEASE_VERSION
          }
          if (-not [string]::IsNullOrWhiteSpace($env:SIGNING_THUMBPRINT)) {
            $parameters.CodeSigningCertificateThumbprint = $env:SIGNING_THUMBPRINT
            $parameters.TimestampUrl = "http://timestamp.digicert.com"
            $parameters.RequireSignature = $true
          }
          .\scripts\package_windows_release.ps1 @parameters

      - name: Smoke-test frozen executables
        shell: pwsh
        run: |
          & .\dist\windows\PaperMonitor\PaperMonitor.exe self-test
          if ($LASTEXITCODE -ne 0) {
            throw "The onedir self-test failed with exit code $LASTEXITCODE."
          }
          & .\dist\windows\PaperMonitor.exe self-test
          if ($LASTEXITCODE -ne 0) {
            throw "The onefile self-test failed with exit code $LASTEXITCODE."
          }

      - name: Verify public signatures
        if: ${{ github.event_name == 'push' || inputs.upload_release }}
        shell: pwsh
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          $files = @(
            ".\dist\windows\PaperMonitor\PaperMonitor.exe",
            ".\public_release\Paper-Monitor-Windows-$env:RELEASE_VERSION.exe",
            ".\public_release\Paper-Monitor-Windows-$env:RELEASE_VERSION-Setup.exe"
          )
          foreach ($file in $files) {
            $signature = Get-AuthenticodeSignature -LiteralPath $file
            if ($signature.Status -ne "Valid") {
              throw "Invalid Authenticode signature for $file: $($signature.Status)"
            }
          }

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: PaperMonitor-Windows-${{ steps.version.outputs.version }}
          if-no-files-found: error
          path: |
            public_release/Paper-Monitor-Windows-${{ steps.version.outputs.version }}.exe
            public_release/Paper-Monitor-Windows-${{ steps.version.outputs.version }}.zip
            public_release/Paper-Monitor-Windows-${{ steps.version.outputs.version }}-Setup.exe
            public_release/SHA256SUMS-${{ steps.version.outputs.version }}.txt

      - name: Upload assets to GitHub Release
        if: ${{ github.event_name == 'push' || inputs.upload_release }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          $assets = @(
            "public_release\Paper-Monitor-Windows-$env:RELEASE_VERSION.exe",
            "public_release\Paper-Monitor-Windows-$env:RELEASE_VERSION.zip",
            "public_release\Paper-Monitor-Windows-$env:RELEASE_VERSION-Setup.exe",
            "public_release\SHA256SUMS-$env:RELEASE_VERSION.txt"
          )
          gh release view $env:RELEASE_TAG *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $env:RELEASE_TAG --verify-tag --draft --title "Paper Monitor $env:RELEASE_VERSION"
            if ($LASTEXITCODE -ne 0) {
              throw "Could not create draft GitHub Release $env:RELEASE_TAG"
            }
          }
          gh release upload $env:RELEASE_TAG @assets --clobber
          if ($LASTEXITCODE -ne 0) {
            throw "GitHub Release upload failed with exit code $LASTEXITCODE"
          }
