name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Source quality and security
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install quality tools
        run: python -m pip install -r requirements-dev.txt

      - name: Run Ruff
        run: python -m ruff check paper_monitor scripts tests windows

      - name: Run Bandit
        run: >-
          python -m bandit -q -r paper_monitor scripts windows -x tests
          -s B105,B404,B603,B607,B608,B110

      - name: Audit Windows dependencies
        run: python -m pip_audit -r requirements-windows.txt --progress-spinner off

  python-tests:
    name: Python tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        python-version:
          - "3.12"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run unit tests
        run: python -m unittest discover -s tests

  windows-package:
    name: Windows package
    runs-on: windows-latest
    needs:
      - quality
      - python-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-windows.txt

      - name: Install Windows dependencies
        run: python -m pip install -r requirements-windows.txt

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --yes --no-progress

      - name: Build complete Windows package
        shell: pwsh
        run: .\scripts\package_windows_release.ps1 -Version "0.0.0-ci.${{ github.run_number }}"

      - name: Upload Windows package
        uses: actions/upload-artifact@v7
        with:
          name: PaperMonitor-Windows-CI-${{ github.run_number }}
          if-no-files-found: error
          retention-days: 7
          path: |
            public_release/Paper-Monitor-Windows-0.0.0-ci.${{ github.run_number }}.exe
            public_release/Paper-Monitor-Windows-0.0.0-ci.${{ github.run_number }}.zip
            public_release/Paper-Monitor-Windows-0.0.0-ci.${{ github.run_number }}-Setup.exe
            public_release/SHA256SUMS-0.0.0-ci.${{ github.run_number }}.txt

  macos-swift-tests:
    name: macOS Swift tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15, macos-26]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run Swift tests
        working-directory: macos/PaperMonitorApp
        run: swift test
