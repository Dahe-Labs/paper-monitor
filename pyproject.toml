[tool.ruff]
target-version = "py312"
line-length = 120
extend-exclude = [
  ".repo-compare",
  ".venv",
  "build",
  "dist",
  "public_release",
]

[tool.ruff.lint]
select = ["E4", "E7", "E9", "F", "I"]

[tool.coverage.run]
branch = true
source = ["paper_monitor"]

[tool.coverage.report]
fail_under = 70
show_missing = true
